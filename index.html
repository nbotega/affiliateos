const fmtBRL = v => {
  if(!v||isNaN(v)) return "R$0";
  if(v>=1000000) return `R$${(v/1000000).toFixed(1)}M`;
  if(v>=1000) return `R$${(v/1000).toFixed(1)}k`;
  return `R$${Number(v).toFixed(0)}`;
};
const fmtNum = v => {
  if(!v||isNaN(v)) return "0";
  if(v>=1000000) return `${(v/1000000).toFixed(1)}M`;
  if(v>=1000) return `${(v/1000).toFixed(0)}k`;
  return String(Math.round(v));
};

function toFloat(v) {
  if(v===null||v===undefined||v==="--"||v==="") return 0;
  if(typeof v==="number") return isNaN(v)?0:v;
  // Handle Brazilian currency: "R$ 1.234,56" or "1.234,56" or "1234.56"
  let s = String(v).replace(/R\$\s*/g,"").trim();
  // If has comma AND dot: dot=thousands, comma=decimal (Brazilian)
  if(s.includes(",")&&s.includes(".")) s=s.replace(/\./g,"").replace(",",".");
  // If only comma: comma=decimal
  else if(s.includes(",")&&!s.includes(".")) s=s.replace(",",".");
  s=s.replace(/[^0-9.\-]/g,"");
  const n=parseFloat(s);
  return isNaN(n)?0:n;
}

function parseCSVLine(line) {
  const r=[];let c="";let q=false;
  for(let i=0;i<line.length;i++){
    if(line[i]==='"'){q=!q;}
    else if(line[i]===','&&!q){r.push(c);c="";}
    else{c+=line[i];}
  }
  r.push(c);return r;
}

function segmentar(gmv, followers, videos, lives) {
  const active=videos>0||lives>0;
  if(gmv>=30000) return "top";
  if(gmv>=15000) return "highval";
  if(gmv>=5000)  return "reliable";
  if(followers>=200000&&gmv<5000) return "highpot";
  if(gmv>=500&&active) return "promising";
  if(gmv>0&&gmv<500)   return "support";
  if(gmv===0&&active&&followers>=50000) return "atrisk";
  if(gmv===0&&active&&followers<50000)  return "new";
  if(gmv===0&&!active&&followers>=10000) return "inactive";
  return "lost";
}

// Segmentation when followers/videos not available (Sheets-only)
function segmentarSimples(gmv) {
  if(gmv>=30000) return "top";
  if(gmv>=15000) return "highval";
  if(gmv>=5000)  return "reliable";
  if(gmv>=500)   return "promising";
  if(gmv>0)      return "support";
  return "new";
}

function initials(h) {
  if(!h) return "??";
  const p=h.replace(/[^a-zA-Z ]/g," ").trim().split(/\s+/);
  return p.length>=2?(p[0][0]+p[1][0]).toUpperCase():h.slice(0,2).toUpperCase();
}

function autoTags(a) {
  const t=[];
  if(a.followers>=1000000) t.push("Mega");
  else if(a.followers>=100000) t.push("Macro");
  else if(a.followers>=10000) t.push("Médio");
  else t.push("Micro");
  if(a.gmvLive>0&&a.gmvLive>a.gmvVideo) t.push("Live Rainha");
  else if(a.lives>0) t.push("Live");
  if(a.videos>0) t.push("Vídeo");
  if(a.gmv>10000) t.push("Alta Conv.");
  return t;
}

function processCSV(text) {
  const lines = text.replace(/\r/g,"").split("\n").filter(l=>l.trim());
  if(lines.length<2) throw new Error("CSV vazio");
  const headers = parseCSVLine(lines[0]);
  const hn = headers.map(s=>(s||"").toLowerCase().normalize("NFD").replace(/[\u0300-\u036f]/g,""));

  // Find columns by name
  const fi = (kws)=>{ for(const kw of kws){const i=hn.findIndex(h=>h.includes(kw));if(i>=0)return i;} return -1; };

  const isLivesSheet = hn.some(h=>h.includes("gmv desde")||h.includes("grupo")||h.includes("gmv/01"));
  
  let hIdx,gmvIdx,livesIdx,followersIdx,videosIdx,gmvLiveIdx,commIdx,ordersIdx;

  const dailyCols=[];
  if(isLivesSheet){
    for(let ci=0;ci<hn.length;ci++){
      if(/^gmv\/\d{2}\/\d{2}$/.test(hn[ci])){
        const label=headers[ci].replace(/gmv\//i,"").replace(/\//,"/");
        const livesCI=ci+1; // Lives está sempre logo após GMV
        dailyCols.push({gmvI:ci,livesI:livesCI,label});
      }
    }
  }
  
  if(isLivesSheet) {
    hIdx        = 0;
    gmvIdx      = fi(["gmv desde comunicacao","gmv desde"]);
    livesIdx    = fi(["lives desde comunicacao","lives desde"]);
    gmvLiveIdx  = livesIdx;
    followersIdx= -1; videosIdx=fi(["videos com produtos","shoppable video","video de produto"]); commIdx=-1; ordersIdx=-1;
    if(gmvIdx<0) gmvIdx=80;
    if(livesIdx<0) livesIdx=81;
  } else {
    hIdx        = fi(["nome do criador","creator name"])||0;
    gmvIdx      = fi(["valor bruto da mercadoria","affiliate gmv","valor bruto"])||1;
    gmvLiveIdx  = fi(["gmv de live","live gmv","gmv de livi","gmv de liv"])||2;
    videosIdx   = fi(["videos com produtos","shoppable video","vídeos com"])||16;
    livesIdx    = fi(["transmissoes ao vivo","live streams","transmissoes"])||15;
    followersIdx= fi(["seguidores de afiliados","followers","seguidores"])||23;

  let totalGMV=0,totalOrders=0,totalAffiliates=0;
  const activeList=[];

  for(let i=1;i<lines.length;i++){
    const cols=parseCSVLine(lines[i]);
    if(cols.length<2) continue;
    const handle=(cols[hIdx]||"").trim().replace(/^"|"$/g,"");
    if(!handle||handle==="Creator name"||handle==="Nome do criador") continue;
    const handleLow=handle.toLowerCase();
    if(handleLow.includes("total")||handleLow.includes("resumo")||handleLow.includes("soma")||handleLow.includes("média")||handleLow.includes("media")) continue;
    const gmv     =toFloat(cols[gmvIdx]);
    const gmvLive =gmvLiveIdx>=0?toFloat(cols[gmvLiveIdx]):0;
    const gmvVideo=0;
    const lives   =livesIdx>=0?toFloat(cols[livesIdx]):0;
    const videos  =videosIdx>=0?toFloat(cols[videosIdx]):0;
    const followers=followersIdx>=0?toFloat(cols[followersIdx]):0;
    const comm    =commIdx>=0?toFloat(cols[commIdx]):0;
    const orders  =ordersIdx>=0?toFloat(cols[ordersIdx]):0;
    const seg=isLivesSheet?segmentarSimples(gmv):segmentar(gmv,followers,videos,lives);
    // Extrai dados diários para o gráfico de evolução (Lives Sheet)
    const dailyGMV=[];const dailyLives=[];
    if(isLivesSheet&&dailyCols.length>0){
      dailyCols.forEach(({gmvI,livesI,label})=>{
        dailyGMV.push({label,value:toFloat(cols[gmvI])});

      });
    }
    segCounts[seg]=(segCounts[seg]||0)+1;

    a.score=calcScore(a.gmv,a.lives,a.videosContent,gmvMax,livesMax);
    a.seg=segmentarScore(a.score,a.gmv,a.followers,a.lives,a.videosContent);
    a.tags=autoTags({followers:a.followers,gmv:a.gmv,gmvLive:a.gmvLive,gmvVideo:a.gmvVideo,lives:a.lives,videos:a.videosContent});
    segCounts[a.seg]=(segCounts[a.seg]||0)+1;
    segGMV[a.seg]=(segGMV[a.seg]||0)+a.gmv;
  });

  activeList.sort((a,b)=>b.gmv-a.gmv);
  return {segCounts,segGMV,totalGMV:Math.round(totalGMV*100)/100,totalOrders,totalAffiliates,activeList:activeList.slice(0,300)};
}


// ─── SCORING INTELIGENTE ─────────────────────────────────────────────────────
const SEG_TOOLTIPS = {
  top:      "Score 75-100 · GMV alto + conteúdo consistente + excelente GMV/conteúdo. Prioridade máxima da gestão.",
  highval:  "Score 55-74 · GMV sólido com boa produção. A um passo do Top — acelere com incentivos exclusivos.",
  reliable: "Score 35-54 · Constante e confiável. Aumente frequência de conteúdo para subir de nível.",
  highpot:  "Grande audiência (200k+ seguidores) com baixa conversão. Alto potencial inexplorado — apoie com estratégia de conteúdo.",
  promising:"Score 20-34 e ativa. Crescendo. Missões simples e primeiro incentivo para decolar.",
  support:  "GMV positivo mas abaixo do potencial. Intervenção humana pode recuperar a performance.",
  new:      "Recém chegada ou primeiros conteúdos. Foco em onboarding e primeira venda.",
  atrisk:   "Grande audiência mas sem conversão recente. Risco de abandono — reengaje urgente.",
  inactive: "Sem atividade no período. Candidata a campanha de reativação automática (bot).",
  lost:     "Sem GMV e sem atividade. Fora da gestão ativa por ora.",
};

function calcScore(gmv, lives, videosContent, gmvMax, livesMax) {
  // videosContent = GMV de vídeos shoppable (R$), não contagem de vídeos
  // Score: GMV é o principal driver (75%) + bônus de atividade (25%)
  // Afiliadas de live recebem crédito por frequência de lives
  // Afiliadas de vídeo recebem crédito proporcional ao share de GMV via vídeos
  const gmvScore  = gmvMax>0 ? (gmv/gmvMax)*100 : 0;
  const liveScore = livesMax>0 ? (Math.min(lives||0,livesMax)/livesMax)*100 : 0;
  const videoShare= gmv>0 ? Math.min((videosContent||0)/gmv,1) : 0;
  const actScore  = Math.max(liveScore, videoShare*100);
  return Math.round(gmvScore*0.75 + actScore*0.25);
}

function segmentarScore(score, gmv, followers, lives, videos) {
  const content=(lives||0)+(videos||0);
  const active=content>0;
  if(score>=75) return "top";
  if(score>=55) return "highval";
  if(score>=35) return "reliable";
  if(followers>=200000&&score<35) return "highpot";
  if(score>=20&&active) return "promising";
  if(gmv>0&&active&&score<20) return "support";
  if(gmv===0&&active&&followers>=50000) return "atrisk";
  if(active) return "new";
  if(followers>=10000) return "inactive";
  return "lost";
}

function LineChart({data,color,label,formatY}){
  if(!data||data.length<2) return <div style={{fontSize:12,color:"#94a3b8",textAlign:"center",padding:"20px 0"}}>Dados insuficientes</div>;
  const vals=data.map(d=>d.value);
  const max=Math.max(...vals,1);
  const W=380,H=70;
  const pts=data.map((d,i)=>`${(i/(data.length-1))*W},${H-(d.value/max)*(H-4)+2}`).join(" ");
  const hasData=vals.some(v=>v>0);
  return(
    <div style={{marginBottom:4}}>
      <div style={{fontSize:11,color:"#64748b",marginBottom:6,fontWeight:600}}>{label}</div>
      {hasData?(
        <div style={{position:"relative"}}>
          <svg width="100%" height={H+20} viewBox={`0 0 ${W} ${H+20}`} style={{overflow:"visible"}}>
            <defs><linearGradient id={`g${color.replace("#","")}`} x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stopColor={color} stopOpacity="0.15"/><stop offset="100%" stopColor={color} stopOpacity="0"/></linearGradient></defs>
            <polygon points={`0,${H} ${pts} ${W},${H}`} fill={`url(#g${color.replace("#","")})`}/>
            <polyline points={pts} fill="none" stroke={color} strokeWidth="2.5" strokeLinejoin="round"/>
            {data.map((d,i)=>d.value>0&&(
              <g key={i}>
                <circle cx={(i/(data.length-1))*W} cy={H-(d.value/max)*(H-4)+2} r="3.5" fill={color}/>
                {i===vals.indexOf(Math.max(...vals))&&<text x={(i/(data.length-1))*W} y={H-(d.value/max)*(H-4)-6} textAnchor="middle" fontSize="9" fill={color} fontWeight="700">{formatY?formatY(d.value):d.value}</text>}
              </g>
            ))}
            {data.filter((_,i)=>i===0||i===data.length-1||i%5===0).map((d,i,arr)=>(
              <text key={i} x={(data.indexOf(d)/(data.length-1))*W} y={H+14} textAnchor="middle" fontSize="8" fill="#94a3b8">{d.label}</text>
            ))}
          </svg>
        </div>
      ):<div style={{fontSize:11,color:"#94a3b8",textAlign:"center",padding:"16px 0",background:"#f8fafc",borderRadius:8}}>Sem atividade no período</div>}
    </div>
  );
}

            <div style={{fontWeight:700,fontSize:14,color:"#0f172a",marginBottom:6}}>{d.titulo}</div>
            <div style={{fontSize:12,color:"#64748b",lineHeight:1.5,marginBottom:12}}>{d.desc}</div>
            <div style={{display:"flex",gap:8,marginBottom:12}}><span style={{background:"#dcfce7",color:"#166534",fontSize:11,padding:"2px 8px",borderRadius:20,fontWeight:600}}>🎁 {d.premio}</span><span style={{background:"#f3f4f6",color:"#6b7280",fontSize:11,padding:"2px 8px",borderRadius:20,fontWeight:600}}>{fmtNum(data.segCounts[d.seg]||0)} alvo</span></div>
            <button style={{width:"100%",background:"#7c3aed",color:"#fff",border:"none",borderRadius:8,padding:"9px 0",fontWeight:600,fontSize:12,cursor:"pointer"}}>Ativar desafio</button>
          </div>
        ))}
      </div>}
      {tab==="badges"&&<div style={{display:"grid",gridTemplateColumns:"repeat(3,1fr)",gap:16}}>
        {[{emoji:"💎",nome:"Diamante",desc:"3 meses no Top 5",cor:"#06b6d4",bg:"#cffafe"},{emoji:"🥇",nome:"Elite",desc:"GMV acima de R$50k",cor:"#f59e0b",bg:"#fef3c7"},{emoji:"🔥",nome:"Em Chamas",desc:"Crescimento +50%",cor:"#ef4444",bg:"#fee2e2"},{emoji:"📡",nome:"Live Rainha",desc:"Maior GMV em live",cor:"#8b5cf6",bg:"#ede9fe"},{emoji:"🚀",nome:"Revelação",desc:"Maior crescimento New",cor:"#22c55e",bg:"#dcfce7"},{emoji:"⭐",nome:"Fidelidade",desc:"6+ meses consecutivos",cor:"#0891b2",bg:"#cffafe"}].map(b=>(
          <div key={b.nome} style={{background:"#fff",borderRadius:12,border:`2px solid ${b.cor}40`,padding:20,textAlign:"center"}}>
            <div style={{fontSize:40,marginBottom:10}}>{b.emoji}</div>
            <div style={{fontWeight:700,fontSize:13,color:"#0f172a",marginBottom:4}}>{b.nome}</div>
            <div style={{fontSize:11,color:"#64748b",marginBottom:12,lineHeight:1.4}}>{b.desc}</div>
            <div style={{background:b.bg,borderRadius:20,padding:"3px 10px",display:"inline-block"}}><span style={{fontSize:10,fontWeight:700,color:b.cor}}>@{top[0]?.handle||"—"}</span></div>
          </div>
        ))}
      </div>}
    </div>
  );
}

function GuiaDeScore(){
  const scoreExamples=[
    {handle:"top_performer",gmv:1900000,lives:33,vid:0,score:91,seg:"top"},
    {handle:"video_star",gmv:1300000,lives:0,vid:1308000,score:76,seg:"top"},
    {handle:"mid_live",gmv:553000,lives:17,vid:553000,score:47,seg:"reliable"},
    {handle:"video_only",gmv:174000,lives:0,vid:174000,score:32,seg:"promising"},
    {handle:"support_case",gmv:75000,lives:1,vid:2000,score:4,seg:"support"},
  ];
  const segColors={"top":"#7c3aed","highval":"#2563eb","reliable":"#059669","highpot":"#0891b2","promising":"#d97706","support":"#dc2626","atrisk":"#ea580c","new":"#16a34a","inactive":"#64748b","lost":"#94a3b8"};
  const segBgs={"top":"#ede9fe","highval":"#dbeafe","reliable":"#dcfce7","highpot":"#cffafe","promising":"#fef3c7","support":"#fee2e2","atrisk":"#ffedd5","new":"#f0fdf4","inactive":"#f1f5f9","lost":"#f8fafc"};
  return(
    <div style={{maxWidth:860}}>
      <div style={{marginBottom:28}}>
        <h1 style={{fontSize:22,fontWeight:800,color:"#0f172a"}}>📖 Guia de Score & Segmentos</h1>
        <p style={{fontSize:13,color:"#64748b",marginTop:4}}>Como o AffiliateOS classifica e pontua cada afiliada</p>
      </div>

      {/* SCORE */}
      <div style={{background:"#fff",borderRadius:16,padding:28,border:"1px solid #e2e8f0",marginBottom:20,boxShadow:"0 1px 4px rgba(0,0,0,0.06)"}}>
        <div style={{fontWeight:800,fontSize:16,color:"#0f172a",marginBottom:6}}>🤖 O que é o Score (0–100)?</div>
        <p style={{fontSize:13,color:"#475569",lineHeight:1.7,marginBottom:20}}>
          Cada afiliada recebe uma nota de 0 a 100 calculada automaticamente toda vez que a planilha é atualizada. O score determina diretamente o segmento de cada afiliada — não existem regras fixas de GMV mínimo, o que importa é a performance <em>relativa ao grupo</em>.
        </p>

        {/* Fórmula */}
        <div style={{background:"#f8fafc",borderRadius:12,padding:20,marginBottom:20}}>
          <div style={{fontWeight:700,fontSize:13,color:"#334155",marginBottom:14}}>Fórmula</div>
          <div style={{display:"flex",gap:12,flexWrap:"wrap"}}>
            {[
              {label:"GMV",pct:"75%",cor:"#7c3aed",bg:"#ede9fe",desc:"GMV da afiliada ÷ GMV da melhor do grupo × 100"},
              {label:"Atividade",pct:"25%",cor:"#059669",bg:"#dcfce7",desc:"O maior entre: frequência de lives OU share do GMV que veio de vídeos"},
            ].map(b=>(
              <div key={b.label} style={{flex:1,minWidth:200,background:b.bg,borderRadius:10,padding:16,border:`1px solid ${b.cor}30`}}>
                <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:6}}>
                  <div style={{background:b.cor,color:"#fff",borderRadius:6,padding:"2px 10px",fontWeight:800,fontSize:16}}>{b.pct}</div>
                  <div style={{fontWeight:700,fontSize:14,color:b.cor}}>{b.label}</div>
                </div>
                <div style={{fontSize:12,color:"#475569",lineHeight:1.6}}>{b.desc}</div>
              </div>
            ))}
          </div>
        </div>

        {/* Detalhe atividade */}
        <div style={{background:"#fffbeb",borderRadius:10,padding:16,border:"1px solid #fde68a",marginBottom:20}}>
          <div style={{fontWeight:700,fontSize:12,color:"#92400e",marginBottom:8}}>⚡ Por que "o maior entre lives e vídeos"?</div>
          <p style={{fontSize:12,color:"#78350f",lineHeight:1.7,margin:0}}>
            No TikTok Shop existem dois perfis de afiliada: quem vende via <strong>live</strong> (frequência de transmissões conta) e quem vende via <strong>vídeo shoppable</strong> (share do GMV gerado por vídeos conta). Somar os dois criaria distorção — afiliadas live-only seriam penalizadas por não ter GMV de vídeo e vice-versa. O sistema pega o canal mais forte de cada uma e usa esse como métrica de atividade.
          </p>
        </div>

        {/* Exemplos */}
        <div style={{fontWeight:700,fontSize:13,color:"#334155",marginBottom:12}}>Exemplos reais</div>
        <div style={{overflowX:"auto"}}>
          <table style={{width:"100%",borderCollapse:"collapse",fontSize:12}}>
            <thead><tr style={{background:"#f1f5f9"}}>
              {["Perfil","GMV","Lives","GMV Vídeo","Score","Segmento"].map(h=><th key={h} style={{padding:"10px 12px",textAlign:"left",fontWeight:600,color:"#64748b"}}>{h}</th>)}
            </tr></thead>
            <tbody>
              {scoreExamples.map((e,i)=>(
                <tr key={e.handle} style={{borderTop:"1px solid #f1f5f9",background:i%2===0?"#fff":"#fafafa"}}>
                  <td style={{padding:"10px 12px",fontWeight:600,color:"#0f172a"}}>@{e.handle}</td>
                  <td style={{padding:"10px 12px",color:"#7c3aed",fontWeight:700}}>{fmtBRL(e.gmv)}</td>
                  <td style={{padding:"10px 12px",color:"#334155"}}>{e.lives}</td>
                  <td style={{padding:"10px 12px",color:"#0891b2"}}>{e.vid>0?fmtBRL(e.vid):"—"}</td>
                  <td style={{padding:"10px 12px"}}><span style={{background:"#f1f5f9",borderRadius:6,padding:"2px 8px",fontWeight:800,color:segColors[e.seg]}}>{e.score}</span></td>
                  <td style={{padding:"10px 12px"}}><span style={{background:segBgs[e.seg],color:segColors[e.seg],borderRadius:20,padding:"2px 10px",fontWeight:700,fontSize:11}}>{SEGMENTOS.find(s=>s.key===e.seg)?.nome||e.seg}</span></td>
                </tr>
              ))}
            </tbody>
          </table>
        </div>
      </div>

      {/* CORTES DE SEGMENTO */}
      <div style={{background:"#fff",borderRadius:16,padding:28,border:"1px solid #e2e8f0",marginBottom:20,boxShadow:"0 1px 4px rgba(0,0,0,0.06)"}}>
        <div style={{fontWeight:800,fontSize:16,color:"#0f172a",marginBottom:6}}>🎯 Os 10 Segmentos</div>
        <p style={{fontSize:13,color:"#475569",lineHeight:1.7,marginBottom:20}}>
          O segmento é calculado automaticamente a partir do score. Afiliadas com grande audiência (200k+ seguidores) e score baixo recebem o segmento <strong>High Potential</strong> independente do score — são priorizadas por potencial inexplorado.
        </p>
        <div style={{display:"flex",flexDirection:"column",gap:8}}>
          {[
            {key:"top",    cut:"Score ≥ 75",   desc:"Elite do grupo. GMV alto + atividade consistente. Gestão VIP, incentivos exclusivos, linha direta com o time."},
            {key:"highval",cut:"Score 55–74",   desc:"A um passo do Top. GMV sólido, potencial de subir com incentivo. Missões de aceleração e benefícios progressivos."},
            {key:"reliable",cut:"Score 35–54",  desc:"Constante e confiável. Precisa aumentar frequência de conteúdo para subir de nível. Foco em volume."},
            {key:"highpot",cut:"200k+ seg. + Score < 35", desc:"Grande audiência, conversão abaixo do esperado. Prioridade de ativação — pode virar Top com a estratégia certa."},
            {key:"promising",cut:"Score 20–34 + ativa",   desc:"Crescendo. Primeiras vendas ou primeiras lives. Missões simples e onboarding para decolar."},
            {key:"support", cut:"GMV > 0 + Score < 20",   desc:"Vende, mas abaixo do potencial. Intervenção humana para entender o bloqueio e corrigir rota."},
            {key:"atrisk",  cut:"GMV zero + ativa + 50k+ seg", desc:"Audiência existe mas não converte. Risco real de abandono — reengaje urgente antes de perder."},
            {key:"new",     cut:"Ativa (outros casos)",   desc:"Recém chegada ou primeiros conteúdos. Foco em onboarding, primeira venda e primeiros kits de produto."},
            {key:"inactive",cut:"Inativa + 10k+ seg",     desc:"Sem atividade no período. Candidata a campanha de reativação automática (bot DM)."},
            {key:"lost",    cut:"Resto",                   desc:"Sem GMV e sem atividade. Fora da gestão ativa por ora. Pode ser reativada em campanhas sazonais."},
          ].map(s=>{
            const si=SEGMENTOS.find(x=>x.key===s.key)||{};
            return(
              <div key={s.key} style={{display:"flex",gap:14,alignItems:"flex-start",padding:"14px 16px",borderRadius:10,background:"#fafafa",border:`1px solid ${si.cor||"#e2e8f0"}20`}}>
                <div style={{flexShrink:0,paddingTop:2}}>
                  <span style={{background:si.bg||"#f1f5f9",color:si.cor||"#64748b",borderRadius:20,padding:"3px 12px",fontWeight:700,fontSize:11,whiteSpace:"nowrap"}}>{si.nome||s.key}</span>
                </div>
                <div style={{flex:1}}>
                  <div style={{fontSize:11,fontWeight:700,color:si.cor||"#64748b",marginBottom:3}}>{s.cut}</div>
                  <div style={{fontSize:12,color:"#475569",lineHeight:1.6}}>{s.desc}</div>
                </div>
              </div>
            );
          })}
        </div>
      </div>

      {/* LEITURA DO DASHBOARD */}
      <div style={{background:"linear-gradient(135deg,#7c3aed,#4f46e5)",borderRadius:16,padding:28,color:"#fff"}}>
        <div style={{fontWeight:800,fontSize:16,marginBottom:10}}>💡 Como ler o Dashboard</div>
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:16,fontSize:13}}>
          {[
            ["GMV Total","Soma de todo o GMV gerado pelas afiliadas no período da planilha conectada."],
            ["Gestão Ativa","Afiliadas nos segmentos Top → New. Excluídas Lost e Inactive."],
            ["Fila Bot","Elegíveis para automação de DM: High Potential, Promising, New, Support e Inactive."],
            ["Clicar nos cards de segmento","Leva diretamente para a lista de afiliadas filtrada por aquele segmento."],
          ].map(([t,d])=>(
            <div key={t} style={{background:"rgba(255,255,255,0.12)",borderRadius:10,padding:14}}>
              <div style={{fontWeight:700,marginBottom:4}}>{t}</div>
              <div style={{opacity:0.85,lineHeight:1.6}}>{d}</div>
            </div>
          ))}
        </div>
      </div>
    </div>
  );
}

function App(){
  const [page,setPage]=useState("dashboard");
  const [segFilter,setSegFilter]=useState("all");
  const [data,setData]=useState(REAL_DATA);
  const [liveStatus,setLiveStatus]=useState("embedded");
  const [selAfil,setSelAfil]=useState(null);
  const onSelect=a=>setSelAfil(a);
  const goToSeg=key=>{setSegFilter(key);setPage("afiliadas");};

  useEffect(()=>{
    setLiveStatus("loading");
    fetch(SHEETS_URL,{mode:"cors"})
      .then(r=>{if(!r.ok)throw new Error(r.status);return r.text();})
      .then(text=>{
        const fresh=processCSV(text);
        setData(fresh);
        setLiveStatus("live");
      })
      .catch(()=>setLiveStatus("embedded"));
  },[]);

  const pages={
    dashboard:<Dashboard setPage={setPage} data={data} liveStatus={liveStatus} onSelect={onSelect} goToSeg={goToSeg}/>,
    afiliadas:<Afiliadas data={data} onSelect={onSelect} segFilter={segFilter} setSegFilter={setSegFilter}/>,
    segmentos:<Segmentos data={data} goToSeg={goToSeg}/>,
    descoberta:<Descoberta/>,
    campanhas:<Campanhas data={data}/>,
    gamificacao:<Gamificacao data={data} onSelect={onSelect}/>,
    guia:<GuiaDeScore/>,
  };

  return(
    <div style={{display:"flex",fontFamily:"-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif",background:"#f8fafc",minHeight:"100vh"}}>
      {selAfil&&<AfiliadaPanel a={selAfil} onClose={()=>setSelAfil(null)}/>}
      <Sidebar page={page} setPage={setPage} liveStatus={liveStatus}/>
      <main style={{marginLeft:216,flex:1,padding:24,minHeight:"100vh"}}>{pages[page]}</main>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
